# Server
server.port=8080

# DataSource (PostgreSQL - production)
spring.datasource.url=jdbc:postgresql://localhost:5432/urlshortener
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Application settings
app.base-url=http://localhost:8080
# Duplicate URL policy: RETURN_EXISTING or CREATE_NEW
app.duplicate-url-policy=RETURN_EXISTING
# Short code length (characters)
app.short-code-length=7
# Allow localhost URLs (false in production)
app.allow-localhost-urls=false
