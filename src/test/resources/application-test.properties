# H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Flyway - use same migrations, H2 PostgreSQL mode handles compatibility
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# App settings for tests
app.base-url=http://localhost:8080
app.duplicate-url-policy=RETURN_EXISTING
app.short-code-length=7
app.allow-localhost-urls=true
